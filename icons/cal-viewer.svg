<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background rounded rect -->
  <rect x="8" y="16" width="112" height="104" rx="14" ry="14" fill="#3584e4"/>
  <!-- Top bar (calendar header) -->
  <rect x="8" y="16" width="112" height="32" rx="14" ry="14" fill="#1c71d8"/>
  <rect x="8" y="32" width="112" height="16" fill="#1c71d8"/>
  <!-- Ring hooks -->
  <rect x="36" y="8" width="10" height="22" rx="5" ry="5" fill="#ffffff" opacity="0.9"/>
  <rect x="82" y="8" width="10" height="22" rx="5" ry="5" fill="#ffffff" opacity="0.9"/>
  <!-- Month label area -->
  <text x="64" y="42" font-family="Sans" font-size="14" font-weight="bold" fill="white" text-anchor="middle">AGENDA</text>
  <!-- Grid lines -->
  <line x1="20" y1="70" x2="108" y2="70" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="88" x2="108" y2="88" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="106" x2="108" y2="106" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Day highlight -->
  <rect x="18" y="55" width="26" height="22" rx="5" ry="5" fill="#ffffff" opacity="0.25"/>
  <!-- Event lines -->
  <rect x="52" y="60" width="50" height="6" rx="3" ry="3" fill="white" opacity="0.8"/>
  <rect x="52" y="78" width="38" height="6" rx="3" ry="3" fill="white" opacity="0.6"/>
  <rect x="52" y="96" width="44" height="6" rx="3" ry="3" fill="white" opacity="0.6"/>
  <!-- Day number -->
  <text x="31" y="71" font-family="Sans" font-size="16" font-weight="bold" fill="white" text-anchor="middle">12</text>
</svg>
