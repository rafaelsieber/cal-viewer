<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="128" height="128">
  <!-- FontAwesome-inspired calendar icon (fa-calendar-days style), monochrome -->
  <!-- Outer body -->
  <rect x="32" y="64" width="384" height="416" rx="40" ry="40" fill="#1a1a1a"/>
  <!-- Header bar cutout (lighter) -->
  <rect x="32" y="64" width="384" height="128" rx="40" ry="40" fill="#1a1a1a"/>
  <rect x="32" y="144" width="384" height="48" fill="#1a1a1a"/>
  <!-- Inner white area (body of calendar) -->
  <rect x="56" y="208" width="336" height="248" rx="8" ry="8" fill="#ffffff"/>
  <!-- Ring hooks -->
  <rect x="128" y="24" width="40" height="88" rx="20" ry="20" fill="#1a1a1a"/>
  <rect x="280" y="24" width="40" height="88" rx="20" ry="20" fill="#1a1a1a"/>
  <!-- Header text dots (week days row) -->
  <!-- Day grid: 3 rows x 4 cols of dots -->
  <!-- Row 1 -->
  <rect x="80"  y="236" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="140" y="236" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="200" y="236" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="260" y="236" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="320" y="236" width="44" height="36" rx="6" fill="#1a1a1a"/>
  <!-- Row 2 -->
  <rect x="80"  y="288" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="140" y="288" width="44" height="36" rx="6" fill="#1a1a1a"/>
  <rect x="200" y="288" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="260" y="288" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="320" y="288" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <!-- Row 3 -->
  <rect x="80"  y="340" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="140" y="340" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="200" y="340" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="260" y="340" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="320" y="340" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <!-- Row 4 -->
  <rect x="80"  y="392" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="140" y="392" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="200" y="392" width="44" height="36" rx="6" fill="#e0e0e0"/>
  <rect x="260" y="392" width="44" height="36" rx="6" fill="#e0e0e0"/>
</svg>
